<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日日選 | 日本直送代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white text-2xl">🇯🇵</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">日日選</h1>
                    <p class="text-xs text-gray-500 -mt-1">日本代購・每日精選</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-gray-700">
                <a href="#home" class="hover:text-orange-600 transition-colors font-medium">首頁</a>
                <a href="#products" class="hover:text-orange-600 transition-colors font-medium">商品</a>
                <a href="#how" class="hover:text-orange-600 transition-colors font-medium">代購流程</a>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleCart()" class="relative p-3 hover:bg-gray-100 rounded-full">
                    <i class="fa-solid fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-6xl md:text-7xl font-bold mb-6">日日選<br>日本好物直送</h2>
            <p class="text-2xl mb-10">化妝品・零食・服飾・動漫周邊<br>專業代購・安心正品</p>
            <a href="#products" class="bg-orange-600 hover:bg-orange-700 px-10 py-4 rounded-2xl font-semibold text-lg inline-block">
                立即逛商品
            </a>
        </div>
    </section>

    <!-- Products Section (保留原商品，可自行修改) -->
    <section id="products" class="py-20 bg-gray-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">精選商品</h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- 商品會由 JS 產生 -->
            </div>
        </div>
    </section>

    <!-- 其他區塊省略...（保持原功能） -->

    <script>
        // 商品資料（你可以之後再改）
        const products = [ /* ... 保持原商品 ... */ ];
        // 其餘 JS 程式碼保持不變
    </script>
</body>
</html>
