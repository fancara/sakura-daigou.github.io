<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日日選 | 日本直送代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
        }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .category-btn.active { background-color: #f97316; color: white; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white text-2xl">🇯🇵</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">日日選</h1>
                    <p class="text-xs text-gray-500 -mt-1">日本代購・每日精選</p>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative p-3 hover:bg-gray-100 rounded-full">
                <i class="fa-solid fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-6xl md:text-7xl font-bold mb-6">日日選<br>日本好物直送</h2>
            <p class="text-2xl mb-10">專業日本代購・安心正品</p>
        </div>
    </section>

    <!-- Categories -->
    <section class="py-8 bg-white border-b">
        <div class="max-w-7xl mx-auto px-6">
            <h3 class="text-lg font-medium mb-4 text-center">產品分類</h3>
            <div id="category-buttons" class="flex flex-wrap gap-3 justify-center">
                <!-- 分類按鈕由 JS 產生 -->
            </div>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="py-16 bg-gray-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-10">精選商品</h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- 商品由 JS 產生 -->
            </div>
        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "SK-II 神仙水 230ml", price: 2890, category: "化妝品類", image: "https://picsum.photos/id/1015/400/400", desc: "經典抗老精華" },
            { id: 2, name: "明治 草莓夾心巧克力", price: 320, category: "食品類", image: "https://picsum.photos/id/292/400/400", desc: "日本限定" },
            { id: 3, name: "UNIQLO 聯名 UT T恤", price: 890, category: "服飾類", image: "https://picsum.photos/id/201/400/400", desc: "潮流聯名" },
            { id: 4, name: "鬼滅之刃 禰豆子手辦", price: 1680, category: "動漫周邊類", image: "https://picsum.photos/id/866/400/400", desc: "正版收藏" },
            { id: 5, name: "資生堂 紅妍肌活精華", price: 2150, category: "化妝品類", image: "https://picsum.photos/id/1016/400/400", desc: "熱賣保養" },
            { id: 6, name: "Calbee 北海道薯片", price: 180, category: "食品類", image: "https://picsum.photos/id/431/400/400", desc: "人氣零食" },
            { id: 7, name: "New Balance 574 鞋款", price: 2890, category: "服飾類", image: "https://picsum.photos/id/669/400/400", desc: "日本限定色" },
        ];

        let currentCategory = "全部";

        function createCategoryButtons() {
            const categories = ["全部", "食品類", "化妝品類", "服飾類", "動漫周邊類"];
            const container = document.getElementById('category-buttons');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-6 py-3 rounded-3xl font-medium transition-all ${cat === currentCategory ? 'active' : 'bg-gray-100 hover:bg-gray-200'}`;
                btn.textContent = cat;
                btn.onclick = () => filterCategory(cat);
                container.appendChild(btn);
            });
        }

        function filterCategory(category) {
            currentCategory = category;
            createCategoryButtons();
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            const filtered = category === "全部" 
                ? products 
                : products.filter(p => p.category === category);
            
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-3xl overflow-hidden shadow-sm';
                card.innerHTML = `
                    <img src="${product.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <span class="text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded-full">${product.category}</span>
                        <h4 class="font-semibold text-lg mt-3 mb-1">${product.name}</h4>
                        <p class="text-sm text-gray-500 mb-4">${product.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold">NT$ ${product.price}</span>
                            <button onclick="addToCart(${product.id})" 
                                    class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-2xl text-sm font-medium">
                                加入
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let cart = [];
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push(product);
                document.getElementById('cart-count').textContent = cart.length;
                alert(`✅ 已加入購物車：${product.name}`);
            }
        }

        function toggleCart() {
            alert(`🛒 購物車內有 ${cart.length} 件商品\n\n此為展示功能，實際請加 Line 下單`);
        }

        // 初始化
        window.onload = () => {
            createCategoryButtons();
            filterCategory("全部");
        };
    </script>
</body>
</html>
