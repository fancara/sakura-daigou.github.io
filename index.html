<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日日選 | 日本直送代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1490806843957-31f1c6e1c1e3?ixlib=rb-4.0.3&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .category-btn.active { background-color: #f97316; color: white; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Top Menu Bar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white text-2xl">🇯🇵</div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">日日選</h1>
                        <p class="text-xs text-gray-500 -mt-1">日本代購専門店</p>
                    </div>
                </div>

                <!-- Main Menu -->
                <div class="hidden md:flex items-center gap-8 text-lg">
                    <a href="#home" class="hover:text-orange-600 font-medium transition-colors">首頁</a>
                    <a href="#products" class="hover:text-orange-600 font-medium transition-colors">全部商品</a>
                    <a href="#categories" class="hover:text-orange-600 font-medium transition-colors">產品分類</a>
                    <a href="#how" class="hover:text-orange-600 font-medium transition-colors">代購流程</a>
                    <a href="#" onclick="showContact()" class="hover:text-orange-600 font-medium transition-colors">聯絡我們</a>
                </div>

                <!-- Cart -->
                <button onclick="toggleCart()" class="relative p-3 hover:bg-gray-100 rounded-full transition">
                    <i class="fa-solid fa-shopping-cart text-2xl"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Banner -->
    <section id="home" class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h2 class="text-6xl md:text-7xl font-bold mb-6 leading-tight">每天為你<br>精選日本好物</h2>
            <p class="text-2xl mb-10 max-w-2xl mx-auto">化妝品・零食・服飾・生活用品・動漫周邊<br>專業代購・正品保障・快速到貨</p>
            <a href="#products" class="inline-block bg-orange-600 hover:bg-orange-700 px-12 py-5 rounded-3xl text-xl font-semibold transition">
                立即選購
            </a>
        </div>
    </section>

    <!-- Categories -->
    <section id="categories" class="py-12 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h3 class="text-3xl font-bold text-center mb-10">產品分類</h3>
            <div id="category-buttons" class="flex flex-wrap gap-4 justify-center">
                <!-- JS 產生 -->
            </div>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="py-16 bg-gray-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">精選商品</h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- 商品由 JS 產生 -->
            </div>
        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "SK-II 神仙水 230ml", price: 2890, category: "化妝品類", image: "https://images.unsplash.com/photo-1556228720-195a672ee8b6?ixlib=rb-4.0.3", desc: "經典抗老精華" },
            { id: 2, name: "明治 草莓巧克力", price: 320, category: "食品類", image: "https://images.unsplash.com/photo-1549007994-cb92caebd54b?ixlib=rb-4.0.3", desc: "人氣零食" },
            { id: 3, name: "UNIQLO 聯名 T恤", price: 890, category: "服飾類", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?ixlib=rb-4.0.3", desc: "潮流穿搭" },
            { id: 4, name: "鬼滅之刃 禰豆子手辦", price: 1680, category: "動漫周邊類", image: "https://images.unsplash.com/photo-1612178537253-bccd437b730e?ixlib=rb-4.0.3", desc: "正版收藏" },
            { id: 5, name: "資生堂 紅妍精華", price: 2150, category: "化妝品類", image: "https://images.unsplash.com/photo-1556228578-0d85b1a4d65b?ixlib=rb-4.0.3", desc: "熱賣保養品" },
            { id: 6, name: "Calbee 北海道薯片", price: 180, category: "食品類", image: "https://images.unsplash.com/photo-1621939514649-570b4c4d1b4f?ixlib=rb-4.0.3", desc: "經典零食" },
        ];

        let currentCategory = "全部";

        function createCategoryButtons() {
            const categories = ["全部", "食品類", "化妝品類", "服飾類", "動漫周邊類"];
            const container = document.getElementById('category-buttons');
            container.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" 
                        class="category-btn px-8 py-4 rounded-3xl font-medium transition-all ${cat === currentCategory ? 'active shadow-md' : 'bg-gray-100 hover:bg-gray-200'}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterCategory(category) {
            currentCategory = category;
            createCategoryButtons();
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            const filtered = category === "全部" ? products : products.filter(p => p.category === category);
            
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-3xl overflow-hidden';
                card.innerHTML = `
                    <img src="${product.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <span class="inline-block bg-orange-100 text-orange-700 text-xs px-4 py-1 rounded-full mb-3">${product.category}</span>
                        <h4 class="font-semibold text-lg leading-tight mb-2">${product.name}</h4>
                        <p class="text-sm text-gray-500 mb-6">${product.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-orange-600">NT$ ${product.price}</span>
                            <button onclick="addToCart(${product.id})" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-2xl text-sm font-medium">加入購物車</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let cart = [];
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push(product);
                document.getElementById('cart-count').textContent = cart.length;
                alert(`✅ 已加入：${product.name}`);
            }
        }

        function toggleCart() {
            alert(`🛒 目前購物車有 ${cart.length} 件商品\n\n請加 Line 聯絡我們下單`);
        }

        function showContact() {
            alert("📱 Line ID：@yourlineid\n歡迎加好友詢問代購！");
        }

        window.onload = () => {
            createCategoryButtons();
            filterCategory("全部");
        };
    </script>
</body>
</html>
