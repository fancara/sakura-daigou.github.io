<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日日選 | 日本直送代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
        }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white text-2xl">🇯🇵</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">日日選</h1>
                    <p class="text-xs text-gray-500 -mt-1">日本代購・每日精選</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-gray-700">
                <a href="#home" class="hover:text-orange-600 transition-colors font-medium">首頁</a>
                <a href="#products" class="hover:text-orange-600 transition-colors font-medium">商品</a>
                <a href="#how" class="hover:text-orange-600 transition-colors font-medium">代購流程</a>
            </div>
            
            <button onclick="toggleCart()" class="relative p-3 hover:bg-gray-100 rounded-full">
                <i class="fa-solid fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-6xl md:text-7xl font-bold mb-6">日日選<br>日本好物直送</h2>
            <p class="text-2xl mb-10">化妝品・零食・服飾・動漫周邊<br>專業代購・安心正品</p>
            <a href="#products" class="bg-orange-600 hover:bg-orange-700 px-10 py-4 rounded-2xl font-semibold text-lg inline-block">
                立即逛商品
            </a>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="py-20 bg-gray-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">精選商品</h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- 商品由 JS 產生 -->
            </div>
        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "SK-II 神仙水 230ml", price: 2890, image: "https://picsum.photos/id/1015/400/400", desc: "經典抗老化精華" },
            { id: 2, name: "明治 草莓夾心巧克力", price: 320, image: "https://picsum.photos/id/292/400/400", desc: "日本限定口味" },
            { id: 3, name: "UNIQLO 聯名 UT T恤", price: 890, image: "https://picsum.photos/id/201/400/400", desc: "限量動漫聯名" },
            { id: 4, name: "鬼滅之刃 禰豆子手辦", price: 1680, image: "https://picsum.photos/id/866/400/400", desc: "正版限定版" },
            { id: 5, name: "資生堂 紅妍肌活精華", price: 2150, image: "https://picsum.photos/id/1016/400/400", desc: "熱賣保養品" },
            { id: 6, name: "Calbee 北海道薯片", price: 180, image: "https://picsum.photos/id/431/400/400", desc: "多種口味" }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-3xl overflow-hidden shadow-sm';
                card.innerHTML = `
                    <img src="${product.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h4 class="font-semibold text-lg mb-1">${product.name}</h4>
                        <p class="text-sm text-gray-500 mb-4">${product.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold text-orange-600">NT$ ${product.price}</span>
                            <button onclick="addToCart(${product.id})" 
                                    class="bg-orange-600 text-white px-5 py-2 rounded-2xl text-sm font-medium hover:bg-orange-700">
                                加入購物車
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let cart = [];
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push(product);
                document.getElementById('cart-count').textContent = cart.length;
                alert(`已加入：${product.name}`);
            }
        }
        function toggleCart() {
            if (cart.length === 0) {
                alert("購物車是空的！");
            } else {
                alert("購物車內有 " + cart.length + " 項商品\n\n（此為展示功能）");
            }
        }

        // 初始化
        window.onload = renderProducts;
    </script>
</body>
</html>
